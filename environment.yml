name: cjm-transcription-plugin-qwen3-forced-aligner
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pip:
    - torch
    - qwen-asr
    # Substrate (cjm-plugin-system) is AUTO-INJECTED by install-all schema v2 — not listed here.
    - cjm-capability-primitives
    # Shared plugin utils (torch release/OOM + HF Hub download/cache)
    - cjm-torch-plugin-utils
    - cjm-hf-plugin-utils
    - soundfile
    - numpy
    - fastcore
    # Worker deps
    - fastapi
    - uvicorn
    - psutil
    - httpx
